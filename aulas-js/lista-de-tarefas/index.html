<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="estilo/style.css">
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
    </header>

    <div id="list">
        <input type="text" placeholder="Digite sua tarefa" id="inputTarefa">
        <button id="btn-add" class="add" onclick="criarTarefa()">Adicionar</button>
    </div>

    <main id="areaLista">
        <div class="item">
            <div class="item-icone">
                <img class="icon" src="icons/cancel.svg" alt="Ícone de tarefa">
            </div>
            <div class="item-nome">
                <p>Minha tarefa</p>
            </div>
            <div class="item-botao">
                <button class="del"> <img class="icon" src="icons/delete-alert.svg" alt="Ícone de deletar tarefa"></button>
            </div>
        </div>

        <div class="item-clicado">
            <div class="item-icone">
                <img class="icon" src="icons/check-circle-outline.svg" alt="Ícone de tarefa">
            </div>
            <div class="item-nome">
                <p>Minha tarefa</p>
            </div>
            <div class="item-botao">
                <button class="del" onclick="deletarTarefa()"> <img class="icon" src="icons/delete-alert.svg" alt="Ícone de deletar tarefa"></button>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
